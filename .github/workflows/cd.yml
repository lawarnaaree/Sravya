name: Deploy Server

on:
  # Only runs after the CI workflow completes successfully on main
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

  # Allow manual re-deploy from the Actions tab (e.g. to rollback or force push)
  workflow_dispatch:

jobs:
  # ── Deploy to cPanel via SSH ──────────────────────────────────────────────
  deploy:
    name: Deploy to cPanel
    runs-on: ubuntu-latest
    environment: production

    # For workflow_run: only proceed if CI passed.
    # For workflow_dispatch: always proceed (manual trigger).
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4
        with:
          # For workflow_run the default SHA is the workflow trigger commit,
          # not the head commit — pin to the correct one.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      # ── Upload ALL server files via rsync ─────────────────────────────────
      # Excludes: .env (stays on server), uploads/ (audio files), db/ (SQLite),
      # node_modules/ (reinstalled on server), tests/ (not needed in prod)
      - name: Rsync server files to cPanel
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: >-
            -avz
            --delete
            --exclude='.env'
            --exclude='uploads/'
            --exclude='db/'
            --exclude='node_modules/'
            --exclude='tests/'
          path: server/
          remote_path: ${{ secrets.CPANEL_APP_PATH }}/
          remote_host: ${{ secrets.CPANEL_SSH_HOST }}
          remote_user: ${{ secrets.CPANEL_SSH_USER }}
          remote_key: ${{ secrets.CPANEL_SSH_PRIVATE_KEY }}

      # ── SSH: create dirs, install deps, restart Passenger ─────────────────
      - name: Bootstrap dirs, install deps, restart app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CPANEL_SSH_HOST }}
          username: ${{ secrets.CPANEL_SSH_USER }}
          key: ${{ secrets.CPANEL_SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ secrets.CPANEL_APP_PATH }}

            # Create all directories the app needs on first deploy and keep them on updates.
            # uploads/ and db/ are excluded from rsync so they persist across deploys.
            mkdir -p uploads/tracks
            mkdir -p uploads/covers
            mkdir -p db
            mkdir -p tmp

            # Install / update production dependencies
            npm install --production --prefer-offline

            # Phusion Passenger restart signal — cPanel picks this up automatically
            touch tmp/restart.txt

            echo "✓ Deploy complete at $(date)"
            echo "✓ App path: ${{ secrets.CPANEL_APP_PATH }}"

  # ── E2E smoke test: confirm the live API responds ─────────────────────────
  smoke-test:
    name: E2E Smoke Test
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Wait for Passenger to restart
        run: sleep 15

      - name: GET /api/health
        run: |
          URL="https://api.${{ secrets.CPANEL_SSH_HOST }}/api/health"
          echo "Checking $URL"
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$URL" || echo "000")
          echo "Response: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "FAILED: expected 200, got $STATUS"
            exit 1
          fi
          echo "Smoke test passed ✓"

      - name: GET /api/tracks (auth check)
        run: |
          URL="https://api.${{ secrets.CPANEL_SSH_HOST }}/api/tracks"
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$URL" || echo "000")
          if [ "$STATUS" != "401" ]; then
            echo "FAILED: unauthenticated request should return 401, got $STATUS"
            exit 1
          fi
          echo "Auth check passed ✓"
