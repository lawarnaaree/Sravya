name: Deploy Server

on:
  # Runs after CI completes successfully on main
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

  # Manual re-deploy from Actions tab (rollback, force push, etc.)
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to cPanel
    runs-on: ubuntu-latest
    environment: production

    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      # ── Copy server/ directory to cPanel app root ────────────────────────────
      # Result: /home/lawarnaa/sravya-api/server/{index.js,app.js,...}
      # strip_components is NOT set — we preserve the server/ subdirectory so
      # Passenger can find the startup file at server/index.js.
      - name: Copy server files to cPanel
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CPANEL_SSH_HOST }}
          username: ${{ secrets.CPANEL_SSH_USER }}
          key: ${{ secrets.CPANEL_SSH_PRIVATE_KEY }}
          port: ${{ secrets.CPANEL_SSH_PORT }}
          source: "server/app.js,server/index.js,server/package.json,server/middleware,server/routes,server/db"
          target: ${{ secrets.CPANEL_APP_PATH }}

      # ── SSH: install deps and restart Passenger ──────────────────────────────
      - name: Install dependencies and restart app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CPANEL_SSH_HOST }}
          username: ${{ secrets.CPANEL_SSH_USER }}
          key: ${{ secrets.CPANEL_SSH_PRIVATE_KEY }}
          port: ${{ secrets.CPANEL_SSH_PORT }}
          script: |
            set -e

            APP_PATH="${{ secrets.CPANEL_APP_PATH }}"
            # Strip leading UTF-8 BOM in case the secret was saved with Windows encoding
            APP_PATH="${APP_PATH#$'\xef\xbb\xbf'}"
            echo "APP_PATH: '$APP_PATH'"

            # Activate cPanel's CloudLinux Node.js virtual environment.
            APP_BASENAME=$(basename "$APP_PATH")
            ACTIVATED=0
            VENV_ACTIVATE_PATH=""
            for venv in \
              "$HOME/nodevenv/$APP_BASENAME"/*/bin/activate \
              "$HOME/nodevenv"/*/*/bin/activate; do
              if [ -f "$venv" ]; then
                echo "Activating venv: $venv"
                # shellcheck disable=SC1090
                source "$venv"
                ACTIVATED=1
                VENV_ACTIVATE_PATH="$venv"
                break
              fi
            done
            if [ "$ACTIVATED" -eq 0 ]; then
              echo "ERROR: no nodevenv found under $HOME/nodevenv/"
              ls "$HOME/nodevenv/" 2>/dev/null || echo "(nodevenv dir missing)"
              exit 1
            fi

            echo "Node: $(node -v)  NPM: $(npm -v)"

            # Derive venv prefix from activate script path.
            VENV_PREFIX="$(cd "$(dirname "$VENV_ACTIVATE_PATH")/.." && pwd)"
            echo "venv prefix: $VENV_PREFIX"

            # Unset npm_config_prefix so npm falls back to the system alt-nodejs
            # prefix (/opt/alt/alt-nodejs20/root/usr), which already has lib/package.json.
            # When npm_config_prefix points to our venv and we create an empty lib/package.json
            # there, npm reads it as "global packages up to date" and installs nothing.
            # With the prefix unset, local `npm install` (without -g) writes to ./node_modules.
            unset npm_config_prefix

            # Create runtime directories
            mkdir -p "$HOME/sravya-data/uploads" "$HOME/sravya-data/covers"
            mkdir -p "$APP_PATH/server" "$APP_PATH/tmp"

            # Install production deps locally. --prefix . forces ./node_modules as target.
            cd "$APP_PATH/server"
            rm -f package-lock.json
            npm install --prefix . --omit=dev 2>&1
            echo "npm install exit $?"

            # Locate where packages landed
            if [ -d "./node_modules/express" ]; then
              echo "Packages in server/node_modules/ ✓"
            elif [ -d "$VENV_PREFIX/lib/node_modules/express" ]; then
              # cPanel's npm redirected to venv — link into app root for Node resolution
              ln -sfn "$VENV_PREFIX/lib/node_modules" "$APP_PATH/node_modules"
              echo "Linked venv node_modules into app root ✓"
            else
              echo "ERROR: express not found after install — showing search:"
              find "$HOME" -maxdepth 8 -name "express" -type d 2>/dev/null | head -5 || true
              exit 1
            fi

            # Write .env (cwd is already $APP_PATH/server)
            {
              echo "API_KEY=${{ secrets.CPANEL_API_KEY }}"
              echo "DATA_DIR=$HOME/sravya-data"
              echo "NODE_ENV=production"
            } > .env
            echo ".env written"

            # Restart Passenger via relative path to avoid any BOM in APP_PATH
            mkdir -p ../tmp
            touch ../tmp/restart.txt

            echo "Deploy complete at $(date -u)"

  # ── Live smoke test after deploy ─────────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy
    continue-on-error: true  # DNS may still be propagating; deploy is already done

    steps:
      - name: Wait for Passenger restart
        run: sleep 15

      - name: Health check
        run: |
          URL="https://sravya.api.lawarnaaree.com.np/api/health"
          echo "Checking $URL ..."
          BODY=$(curl -sv --max-time 30 "$URL" 2>&1) || true
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$URL" 2>/dev/null || echo "000")
          echo "HTTP status: $STATUS"
          echo "Response: $BODY"
          [ "$STATUS" = "200" ] || { echo "FAIL: expected 200, got $STATUS"; exit 1; }
          echo "Health check passed ✓"

      - name: Auth gate check (expect 401)
        run: |
          URL="https://sravya.api.lawarnaaree.com.np/api/tracks"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$URL")
          echo "Status: $STATUS"
          [ "$STATUS" = "401" ] || { echo "FAIL: expected 401, got $STATUS"; exit 1; }
          echo "Auth check passed ✓"

      - name: Authenticated request check (expect 200)
        run: |
          URL="https://sravya.api.lawarnaaree.com.np/api/tracks"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            -H "Authorization: Bearer ${{ secrets.CPANEL_API_KEY }}" "$URL")
          echo "Status: $STATUS"
          [ "$STATUS" = "200" ] || { echo "FAIL: expected 200, got $STATUS"; exit 1; }
          echo "Authenticated check passed ✓"
