name: Deploy Server

on:
  # Runs after CI completes successfully on main
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

  # Manual re-deploy from Actions tab (rollback, force push, etc.)
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to cPanel
    runs-on: ubuntu-latest
    environment: production

    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      # ── Pre-install JS deps on CI runner ─────────────────────────────────────
      # Install with --ignore-scripts to skip native compilation (better-sqlite3).
      # The server will recompile native modules via `npm rebuild` after upload.
      # This avoids fighting cPanel's npm venv configuration entirely.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install server dependencies (CI)
        run: |
          cd server
          npm install --omit=dev --ignore-scripts 2>&1
          echo "packages installed:"
          ls node_modules | head -10

      # ── SCP the server/ directory to cPanel ──────────────────────────────────
      # source: "server" (a directory, not a glob) + strip_components: 0 makes
      # drone-scp tar the whole server/ dir and extract it under $target, so files
      # land at $target/server/index.js, $target/server/package.json, etc.
      # This preserves the structure Passenger needs for startup file server/index.js.
      - name: Copy server directory to cPanel
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CPANEL_SSH_HOST }}
          username: ${{ secrets.CPANEL_SSH_USER }}
          key: ${{ secrets.CPANEL_SSH_PRIVATE_KEY }}
          port: ${{ secrets.CPANEL_SSH_PORT }}
          source: "server"
          target: ${{ secrets.CPANEL_APP_PATH }}
          strip_components: 0

      # ── SSH: rebuild native modules, write config, restart Passenger ─────────
      - name: Rebuild native modules and restart app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CPANEL_SSH_HOST }}
          username: ${{ secrets.CPANEL_SSH_USER }}
          key: ${{ secrets.CPANEL_SSH_PRIVATE_KEY }}
          port: ${{ secrets.CPANEL_SSH_PORT }}
          script: |
            set -e

            APP_PATH="${{ secrets.CPANEL_APP_PATH }}"
            APP_PATH="${APP_PATH#$'\xef\xbb\xbf'}"
            echo "APP_PATH: '$APP_PATH'"

            echo "=== Post-SCP directory listing ==="
            ls -la "$APP_PATH/" 2>/dev/null || echo "(APP_PATH missing)"
            ls -la "$APP_PATH/server/" 2>/dev/null || echo "(server/ missing or empty)"

            # Activate cPanel Node.js venv
            APP_BASENAME=$(basename "$APP_PATH")
            ACTIVATED=0
            for venv in \
              "$HOME/nodevenv/$APP_BASENAME"/*/bin/activate \
              "$HOME/nodevenv"/*/*/bin/activate; do
              if [ -f "$venv" ]; then
                echo "Activating venv: $venv"
                # shellcheck disable=SC1090
                source "$venv"
                ACTIVATED=1
                break
              fi
            done
            if [ "$ACTIVATED" -eq 0 ]; then
              echo "ERROR: no nodevenv found"
              ls "$HOME/nodevenv/" 2>/dev/null || echo "(nodevenv dir missing)"
              exit 1
            fi
            echo "Node: $(node -v)  NPM: $(npm -v)"

            # Detect where SCP placed the files: server/ subdir or app root
            if [ -f "$APP_PATH/server/package.json" ]; then
              SERVER_DIR="$APP_PATH/server"
              echo "Files at $SERVER_DIR ✓"
            elif [ -f "$APP_PATH/package.json" ]; then
              SERVER_DIR="$APP_PATH"
              echo "Files at $SERVER_DIR (SCP stripped server/ prefix)"
            else
              echo "ERROR: package.json not found in $APP_PATH/ or $APP_PATH/server/"
              exit 1
            fi

            # Create runtime directories
            mkdir -p "$HOME/sravya-data/uploads" "$HOME/sravya-data/covers"
            mkdir -p "$APP_PATH/tmp"

            # Rebuild native modules (better-sqlite3) for the server's platform.
            # CI installed pure-JS only (--ignore-scripts); we compile here where
            # we have the correct glibc and Node headers.
            cd "$SERVER_DIR"
            echo "Rebuilding native modules in $SERVER_DIR ..."
            npm rebuild 2>&1 || {
              echo "npm rebuild failed — trying npm install as fallback"
              npm install \
                --userconfig /dev/null \
                --prefix "$SERVER_DIR" \
                --omit=dev \
                2>&1
            }
            echo "rebuild/install exit $?"

            # Verify express is accessible
            if [ -d "$SERVER_DIR/node_modules/express" ]; then
              echo "node_modules/express ✓"
            else
              echo "ERROR: express not found in $SERVER_DIR/node_modules/"
              ls "$SERVER_DIR/node_modules/" 2>/dev/null | head -10 || echo "(node_modules empty)"
              exit 1
            fi

            # Write .env — dotenv reads from process.cwd() which Passenger sets
            # to the app root. Write to both locations for safety.
            {
              echo "API_KEY=${{ secrets.CPANEL_API_KEY }}"
              echo "DATA_DIR=$HOME/sravya-data"
              echo "NODE_ENV=production"
            } | tee "$APP_PATH/.env" > "$SERVER_DIR/.env"
            echo ".env written to $APP_PATH/.env and $SERVER_DIR/.env"

            # Restart Passenger
            touch "$APP_PATH/tmp/restart.txt"
            echo "Passenger restart triggered"

            echo "Deploy complete at $(date -u)"

  # ── Live smoke test after deploy ─────────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy
    continue-on-error: true

    steps:
      - name: Wait for Passenger restart
        run: sleep 15

      - name: Health check
        run: |
          URL="https://sravya.api.lawarnaaree.com.np/api/health"
          echo "Checking $URL ..."
          BODY=$(curl -sv --max-time 30 "$URL" 2>&1) || true
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$URL" 2>/dev/null || echo "000")
          echo "HTTP status: $STATUS"
          echo "Response: $BODY"
          [ "$STATUS" = "200" ] || { echo "FAIL: expected 200, got $STATUS"; exit 1; }
          echo "Health check passed ✓"

      - name: Auth gate check (expect 401)
        run: |
          URL="https://sravya.api.lawarnaaree.com.np/api/tracks"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$URL")
          echo "Status: $STATUS"
          [ "$STATUS" = "401" ] || { echo "FAIL: expected 401, got $STATUS"; exit 1; }
          echo "Auth check passed ✓"

      - name: Authenticated request check (expect 200)
        run: |
          URL="https://sravya.api.lawarnaaree.com.np/api/tracks"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            -H "Authorization: Bearer ${{ secrets.CPANEL_API_KEY }}" "$URL")
          echo "Status: $STATUS"
          [ "$STATUS" = "200" ] || { echo "FAIL: expected 200, got $STATUS"; exit 1; }
          echo "Authenticated check passed ✓"
