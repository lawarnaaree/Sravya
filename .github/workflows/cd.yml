name: Deploy Server

on:
  # Runs after CI completes successfully on main
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

  # Manual re-deploy from Actions tab (rollback, force push, etc.)
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to cPanel
    runs-on: ubuntu-latest
    environment: production

    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      # ── Copy server/ directory to cPanel app root ────────────────────────────
      # Result: /home/lawarnaa/sravya-api/server/{index.js,app.js,...}
      # strip_components is NOT set — we preserve the server/ subdirectory so
      # Passenger can find the startup file at server/index.js.
      - name: Copy server files to cPanel
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CPANEL_SSH_HOST }}
          username: ${{ secrets.CPANEL_SSH_USER }}
          key: ${{ secrets.CPANEL_SSH_PRIVATE_KEY }}
          port: ${{ secrets.CPANEL_SSH_PORT }}
          source: "server/app.js,server/index.js,server/package.json,server/middleware,server/routes,server/db"
          target: ${{ secrets.CPANEL_APP_PATH }}

      # ── SSH: install deps and restart Passenger ──────────────────────────────
      - name: Install dependencies and restart app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CPANEL_SSH_HOST }}
          username: ${{ secrets.CPANEL_SSH_USER }}
          key: ${{ secrets.CPANEL_SSH_PRIVATE_KEY }}
          port: ${{ secrets.CPANEL_SSH_PORT }}
          script: |
            set -e

            APP_PATH="${{ secrets.CPANEL_APP_PATH }}"

            # Activate cPanel's CloudLinux Node.js virtual environment.
            # Try app-basename first, then fall back to any venv under ~/nodevenv/.
            APP_BASENAME=$(basename "$APP_PATH")
            ACTIVATED=0
            VENV_ACTIVATE_PATH=""
            for venv in \
              "$HOME/nodevenv/$APP_BASENAME"/*/bin/activate \
              "$HOME/nodevenv"/*/*/bin/activate; do
              if [ -f "$venv" ]; then
                echo "Activating venv: $venv"
                # shellcheck disable=SC1090
                source "$venv"
                ACTIVATED=1
                VENV_ACTIVATE_PATH="$venv"
                break
              fi
            done
            if [ "$ACTIVATED" -eq 0 ]; then
              echo "ERROR: no nodevenv found under $HOME/nodevenv/"
              ls "$HOME/nodevenv/" 2>/dev/null || echo "(nodevenv dir missing)"
              exit 1
            fi

            echo "Node: $(node -v)  NPM: $(npm -v)"

            # Derive venv prefix from the activate script path (.../bin/activate -> ../..).
            # npm prefix -g resolves to the system alt-nodejs path (/opt/alt/...) which is
            # read-only; deriving from the activate path gives the user-writable venv root.
            VENV_PREFIX="$(cd "$(dirname "$VENV_ACTIVATE_PATH")/.." && pwd)"
            echo "venv prefix: $VENV_PREFIX"
            export npm_config_prefix="$VENV_PREFIX"

            # npm v10 reads $npm_config_prefix/lib/package.json at startup; create if missing.
            mkdir -p "$VENV_PREFIX/lib"
            if [ ! -f "$VENV_PREFIX/lib/package.json" ]; then
              echo '{}' > "$VENV_PREFIX/lib/package.json"
              echo "Created missing venv manifest at $VENV_PREFIX/lib/package.json"
            fi

            # Create runtime directories (idempotent)
            mkdir -p "$HOME/sravya-data/uploads"
            mkdir -p "$HOME/sravya-data/covers"
            mkdir -p "$APP_PATH/tmp"

            # Install production dependencies into the server directory.
            cd "$APP_PATH/server"
            npm install --omit=dev
            echo "npm install complete"

            # If packages landed in the venv prefix (cPanel nodevenv model),
            # link them into the app root so Node.js walks up and finds them.
            if [ -d "$VENV_PREFIX/lib/node_modules/express" ]; then
              ln -sfn "$VENV_PREFIX/lib/node_modules" "$APP_PATH/node_modules"
              echo "Linked node_modules: $APP_PATH/node_modules -> $VENV_PREFIX/lib/node_modules"
            elif [ -d "$APP_PATH/server/node_modules/express" ]; then
              echo "Packages in server/node_modules/ (local install)"
            else
              echo "WARNING: express not found after install"
              ls "$VENV_PREFIX/lib/node_modules/" 2>/dev/null | head -5 || true
              ls "$APP_PATH/server/node_modules/" 2>/dev/null | head -5 || true
            fi

            # Write the production .env so index.js can find API_KEY and DATA_DIR.
            # dotenv loads this file on startup; Passenger doesn't inject env vars here.
            {
              echo "API_KEY=${{ secrets.CPANEL_API_KEY }}"
              echo "DATA_DIR=$HOME/sravya-data"
              echo "NODE_ENV=production"
            } > "$APP_PATH/server/.env"
            echo ".env written"

            # Signal Phusion Passenger to restart the app
            touch "$APP_PATH/tmp/restart.txt"

            echo "Deploy complete at $(date -u)"

  # ── Live smoke test after deploy ─────────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy
    continue-on-error: true  # DNS may still be propagating; deploy is already done

    steps:
      - name: Wait for Passenger restart
        run: sleep 15

      - name: Health check
        run: |
          URL="https://sravya.api.lawarnaaree.com.np/api/health"
          echo "Checking $URL ..."
          BODY=$(curl -sv --max-time 30 "$URL" 2>&1) || true
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$URL" 2>/dev/null || echo "000")
          echo "HTTP status: $STATUS"
          echo "Response: $BODY"
          [ "$STATUS" = "200" ] || { echo "FAIL: expected 200, got $STATUS"; exit 1; }
          echo "Health check passed ✓"

      - name: Auth gate check (expect 401)
        run: |
          URL="https://sravya.api.lawarnaaree.com.np/api/tracks"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$URL")
          echo "Status: $STATUS"
          [ "$STATUS" = "401" ] || { echo "FAIL: expected 401, got $STATUS"; exit 1; }
          echo "Auth check passed ✓"

      - name: Authenticated request check (expect 200)
        run: |
          URL="https://sravya.api.lawarnaaree.com.np/api/tracks"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            -H "Authorization: Bearer ${{ secrets.CPANEL_API_KEY }}" "$URL")
          echo "Status: $STATUS"
          [ "$STATUS" = "200" ] || { echo "FAIL: expected 200, got $STATUS"; exit 1; }
          echo "Authenticated check passed ✓"
