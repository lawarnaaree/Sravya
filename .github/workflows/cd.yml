name: Deploy Server

on:
  # Only runs after the CI workflow completes successfully on main
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

  # Allow manual re-deploy from the Actions tab (e.g. to rollback or force push)
  workflow_dispatch:

jobs:
  # ── Deploy to cPanel via SSH ──────────────────────────────────────────────
  deploy:
    name: Deploy to cPanel
    runs-on: ubuntu-latest
    environment: production

    # For workflow_run: only proceed if CI passed.
    # For workflow_dispatch: always proceed (manual trigger).
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4
        with:
          # For workflow_run the default SHA is the workflow trigger commit,
          # not the head commit — pin to the correct one.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      # ── Upload ALL server files via rsync ─────────────────────────────────
      # Excludes: .env (stays on server), uploads/ (audio files), db/ (SQLite),
      # node_modules/ (reinstalled on server), tests/ (not needed in prod)
      - name: Copy server files via SCP to cPanel
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CPANEL_SSH_HOST }}
          username: ${{ secrets.CPANEL_SSH_USER }}
          key: ${{ secrets.CPANEL_SSH_PRIVATE_KEY }}
          port: ${{ secrets.CPANEL_SSH_PORT || 22 }}
          source: "server/app.js,server/index.js,server/package.json,server/middleware,server/routes,server/db/database.js"
          target: ${{ secrets.CPANEL_APP_PATH }}
          strip_components: 1

      # ── SSH: create dirs, install deps, restart Passenger ─────────────────
      - name: Bootstrap dirs, install deps, restart app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CPANEL_SSH_HOST }}
          username: ${{ secrets.CPANEL_SSH_USER }}
          key: ${{ secrets.CPANEL_SSH_PRIVATE_KEY }}
          port: ${{ secrets.CPANEL_SSH_PORT || 22 }}
          script: |
            set -e

            # Activate the cPanel CloudLinux Node.js virtual environment.
            # cPanel's "Setup Node.js App" installs Node into:
            #   ~/nodevenv/<app-dir-basename>/<major-version>/bin/
            APP_DIR=$(basename "${{ secrets.CPANEL_APP_PATH }}")
            ACTIVATE=""
            for venv in "$HOME/nodevenv/$APP_DIR"/*/bin/activate; do
              if [ -f "$venv" ]; then
                ACTIVATE="$venv"
              fi
            done

            if [ -n "$ACTIVATE" ]; then
              echo "Activating Node.js virtual environment: $ACTIVATE"
              source "$ACTIVATE"
            else
              echo "WARNING: No nodevenv activation script found, trying PATH as-is"
            fi

            echo "Using node $(node -v) / npm $(npm -v)"

            cd ${{ secrets.CPANEL_APP_PATH }}

            # Create all directories the app needs on first deploy
            mkdir -p uploads/tracks
            mkdir -p uploads/covers
            mkdir -p db
            mkdir -p tmp

            # Install / update production dependencies
            npm install --production

            # Phusion Passenger restart signal
            touch tmp/restart.txt

            echo "✓ Deploy complete at $(date)"

  # ── E2E smoke test: confirm the live API responds ─────────────────────────
  smoke-test:
    name: E2E Smoke Test
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Wait for Passenger to restart
        run: sleep 20

      - name: GET /api/health
        run: |
          URL="${{ secrets.CPANEL_API_URL }}/api/health"
          # Fallback if CPANEL_API_URL secret is not set
          if [ -z "${{ secrets.CPANEL_API_URL }}" ]; then
            URL="https://api.${{ secrets.CPANEL_SSH_HOST }}/api/health"
          fi
          echo "Checking $URL"
          BODY=$(curl -s --max-time 30 "$URL" || echo "CURL_FAILED")
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$URL" || echo "000")
          echo "Status: $STATUS"
          echo "Body: $BODY"
          if [ "$STATUS" != "200" ]; then
            echo "FAILED: expected 200, got $STATUS"
            exit 1
          fi
          echo "Smoke test passed ✓"

      - name: GET /api/tracks (auth check)
        run: |
          URL="${{ secrets.CPANEL_API_URL }}/api/tracks"
          if [ -z "${{ secrets.CPANEL_API_URL }}" ]; then
            URL="https://api.${{ secrets.CPANEL_SSH_HOST }}/api/tracks"
          fi
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$URL" || echo "000")
          if [ "$STATUS" != "401" ]; then
            echo "FAILED: unauthenticated request should return 401, got $STATUS"
            exit 1
          fi
          echo "Auth check passed ✓"
